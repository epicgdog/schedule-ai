services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./db:/app/db
      - ./.env:/app/.env
    environment:
      - DATABASE=db/main.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:6767"
    depends_on:
      - backend
    restart: unless-stopped
